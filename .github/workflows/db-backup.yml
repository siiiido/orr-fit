name: Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump and Encrypt Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          BACKUP_DATE=$(date +'%Y-%m-%d')
          # 1. 덤프 생성
          pg_dump --clean --if-exists --no-owner --no-privileges --quote-all-identifiers -d "$SUPABASE_DB_URL" -f "orr-fit-db-backup-$BACKUP_DATE.sql"
          
          # 2. GPG 암호화
          gpg --symmetric --batch --yes --passphrase "$BACKUP_ENCRYPTION_PASSWORD" -o "orr-fit-db-backup-$BACKUP_DATE.sql.gpg" "orr-fit-db-backup-$BACKUP_DATE.sql"
          
          # 3. 원본 파일 삭제
          rm "orr-fit-db-backup-$BACKUP_DATE.sql"

      - name: Upload Encrypted Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orr-fit-db-backup
          path: orr-fit-db-backup-*.sql.gpg
          retention-days: 90
